```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>PHP URL Builder</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1200px;
    margin:20px auto;
    padding:20px;
}

h1{
    margin-top:0;
}

input,select{
    padding:6px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
}

button{
    padding:8px 14px;
    cursor:pointer;
}

.output{
    width:100%;
    height:400px;
    margin-top:20px;
    font-family:monospace;
}
</style>
</head>

<body>

<h1>PHP URL Builder</h1>

<div>
    <label>Base URL</label><br>
    <input
        id="baseUrl"
        style="width:100%"
        placeholder="https://web.team-s.club"
    >
</div>

<table id="mappingTable">
    <thead>
        <tr>
            <th>Incoming</th>
            <th>Outgoing</th>
            <th>Type</th>
            <th>Config 1</th>
            <th>Config 2</th>
            <th></th>
        </tr>
    </thead>

    <tbody id="rows"></tbody>
</table>

<br>

<button onclick="addRow()">+ Add Mapping</button>
<button onclick="generate()">Generate PHP</button>

<textarea id="output" class="output"></textarea>

<script>

function addRow() {

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>
            <input class="incoming" placeholder="campaign">
        </td>

        <td>
            <input class="outgoing" placeholder="sub_id_1">
        </td>

        <td>
            <select class="type" onchange="updateConfig(this)">
                <option value="direct">Direct</option>
                <option value="split">Split</option>
                <option value="substring">Substring</option>
            </select>
        </td>

        <td>
            <input class="cfg1">
        </td>

        <td>
            <input class="cfg2">
        </td>

        <td>
            <button onclick="this.closest('tr').remove()">X</button>
        </td>
    `;

    document.getElementById("rows").appendChild(row);
}

function updateConfig(select){

    const row = select.closest("tr");

    const cfg1 = row.querySelector(".cfg1");
    const cfg2 = row.querySelector(".cfg2");

    cfg1.placeholder = "";
    cfg2.placeholder = "";

    if(select.value === "split"){
        cfg1.placeholder = "delimiter";
        cfg2.placeholder = "index";
    }

    if(select.value === "substring"){
        cfg1.placeholder = "start";
        cfg2.placeholder = "length";
    }
}

function buildExpression(type,incoming,cfg1,cfg2){

    const server = `$_SERVER["ADSPECT_${incoming.toUpperCase()}"] ?? ""`;

    if(type === "direct"){
        return server;
    }

    if(type === "split"){
        return `(explode("${cfg1}", ${server})[${cfg2}] ?? "")`;
    }

    if(type === "substring"){
        return `substr(${server}, ${cfg1}, ${cfg2})`;
    }

    return server;
}

function generate(){

    const url = document.getElementById("baseUrl").value.trim();

    if(!url){
        alert("Enter URL");
        return;
    }

    const rows = document.querySelectorAll("#rows tr");

    const parts = [];

    rows.forEach(row => {

        const incoming =
            row.querySelector(".incoming").value.trim();

        if(!incoming){
            return;
        }

        let outgoing =
            row.querySelector(".outgoing").value.trim();

        if(!outgoing){
            outgoing = incoming;
        }

        const type =
            row.querySelector(".type").value;

        const cfg1 =
            row.querySelector(".cfg1").value;

        const cfg2 =
            row.querySelector(".cfg2").value;

        const expr =
            buildExpression(type,incoming,cfg1,cfg2);

        parts.push(
            `"${outgoing}=" . urlencode(${expr})`
        );
    });

    const query =
        parts.join('\n        . "&" .\n        ');

    const php =
`echo json_encode([
    'ok' => true,
    'url' => '${url}?' .
        ${query},
    'expires' => time()
], JSON_UNESCAPED_SLASHES);`;

    document.getElementById("output").value = php;
}

addRow();

</script>

</body>
</html>
```
